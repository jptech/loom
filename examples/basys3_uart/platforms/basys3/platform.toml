[platform]
name = "basys3"
description = "Digilent Basys 3 — XC7A35T Artix-7 development board"
part = "xc7a35tcpg236-1"
board = "digilentinc.com:basys3:1.2"

[platform.clocks.sys_clk]
frequency_mhz = 100.0
period_ns = 10.0
pin = "W5"
standard = "LVCMOS33"
description = "100 MHz on-board oscillator"

[platform.params]
sys_clk_freq_hz = 100_000_000

[platform.variant_defaults]
tags = ["vendor:xilinx"]

[platform.tool]
backend = "vivado"
