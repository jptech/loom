[project]
name = "basys3_blinky"
top_module = "top"
description = "Blinky demo targeting Digilent Basys 3 (Artix-7)"

[target]
part = "xc7a35tcpg236-1"
backend = "vivado"

[filesets.synth]
files = ["src/top.sv"]
constraints = ["constraints/basys3.xdc"]

[dependencies]
blinky = ">=1.0.0"

[profiles.fast_blink]
description = "Fast blink rate — 4 Hz"
[profiles.fast_blink.params]
clk_freq_hz = 25_000_000

[profiles.slow_blink]
description = "Slow blink rate — 0.5 Hz"
[profiles.slow_blink.params]
clk_freq_hz = 200_000_000
