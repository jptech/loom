[component]
name = "ucaspian/io"
version = "1.0.0"
description = "UART, FIFO, and utility IP for uCaspian host communication"

[filesets.synth]
files = [
    "rtl/util.v",
    "rtl/fifo.sv",
    "rtl/uart.sv",
    "rtl/divide_by_n.v",
    "rtl/pwm.v",
    "rtl/pulse_stretcher.v",
]

[variants.ice40]
description = "iCE40-optimized variant using SB_RAM256x16 for FIFO"
tags = ["vendor:lattice"]
[variants.ice40.filesets.synth]
add_files = ["rtl/ice40/fifo_ice40.sv"]
remove_files = ["rtl/fifo.sv"]
