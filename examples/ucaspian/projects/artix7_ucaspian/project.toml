[project]
name = "artix7_ucaspian"
top_module = "artix7_top"
description = "uCaspian neuromorphic processor on Numato Mimas A7 (Artix-7)"
platform = "mimas_a7"

[filesets.synth]
files = ["src/artix7_top.sv"]
constraints = ["constraints/mimas_a7.xdc"]
constraint_scope = "global"

[dependencies]
core = ">=1.0.0"
io = ">=1.0.0"

[profiles.debug]
description = "Debug build — reduced FIFO depth for faster synthesis"
[profiles.debug.params]
fifo_depth = 256
uart_baud = 3_000_000

[profiles.release]
description = "Release build — full FIFO depth, optimized"
[profiles.release.params]
fifo_depth = 1024
uart_baud = 3_000_000
