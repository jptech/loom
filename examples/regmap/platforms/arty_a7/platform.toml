[platform]
name = "arty_a7"
description = "Digilent Arty A7-35T — XC7A35T Artix-7 development board"
part = "xc7a35ticsg324-1l"
board = "digilentinc.com:arty-a7-35:1.1"

[platform.clocks.sys_clk]
frequency_mhz = 100.0
period_ns = 10.0
pin = "E3"
standard = "LVCMOS33"
description = "100 MHz on-board oscillator"

[platform.constraints]
files = ["constraints/arty_a7.xdc"]

[platform.params]
sys_clk_freq_hz = 100_000_000

[platform.variant_defaults]
tags = ["vendor:xilinx", "bus:axilite"]

[platform.tool]
backend = "vivado"
